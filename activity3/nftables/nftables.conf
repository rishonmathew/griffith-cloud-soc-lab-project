#!/usr/sbin/nft -f
flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0;
        policy drop;
        ct state established,related accept
        iif "lo" accept
        iif "eth1" accept
    }

    chain forward {
        type filter hook forward priority 0;
        policy drop;

        # Allow outbound traffic from DMZ to Internet
        iif "eth1" oif "eth0" accept

        # Allow return traffic for established connections
        iif "eth0" oif "eth1" ct state established,related accept

        # Allow inbound HTTP and HTTPS to web server in DMZ
        iif "eth0" oif "eth1" tcp dport { 80, 443 } ct state new accept

        # Allow inbound SMTP to mail server in DMZ
        iif "eth0" oif "eth1" tcp dport 25 ct state new accept

        # Allow DNS forwarding from DMZ
        iif "eth1" oif "eth0" udp dport 53 accept
        iif "eth1" oif "eth0" tcp dport 53 accept
    }

    chain output {
        type filter hook output priority 0;
        policy accept;
    }
}

table ip nat {
    chain prerouting {
        type nat hook prerouting priority -100;

        # Forward incoming HTTP and HTTPS to Ubuntu Server
        iif "eth0" tcp dport 80  dnat to 192.168.1.80:80
        iif "eth0" tcp dport 443 dnat to 192.168.1.80:443

        # Forward incoming SMTP to Ubuntu Server
        iif "eth0" tcp dport 25  dnat to 192.168.1.80:25
    }

    chain postrouting {
        type nat hook postrouting priority 100;
        oif "eth0" masquerade
    }
}
