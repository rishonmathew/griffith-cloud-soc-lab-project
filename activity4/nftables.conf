#!/usr/sbin/nft -f

flush ruleset

# ─── Filter table ───────────────────────────────────────────────────────
table inet filter {

    chain input {
        type filter hook input priority 0;
        policy drop;

        # Always allow loopback traffic
        iif lo accept

        # Allow return traffic for established/related connections
        ct state established,related accept

        # Allow DNS replies arriving back on eth0 (upstream resolver responses)
        iif "eth0" udp sport 53 accept
        iif "eth0" tcp sport 53 accept
    }

    chain output {
        type filter hook output priority 0;
        policy drop;

        # Always allow loopback output
        oif lo accept

        # Allow established/related return traffic
        ct state established,related accept

        # Allow DNS queries leaving eth0 to upstream resolvers
        oif "eth0" udp dport 53 accept
        oif "eth0" tcp dport 53 accept
    }

    chain forward {
        type filter hook forward priority 0;
        policy drop;

        # Allow established/related traffic in both directions
        ct state established,related accept

        # Allow outbound traffic from DMZ to internet
        iif "eth1" oif "eth0" accept

        # Allow inbound HTTP (port 80) — new connections to web server
        iif "eth0" oif "eth1" tcp dport 80  ct state new accept

        # Allow inbound HTTPS (port 443) — new connections to web server
        iif "eth0" oif "eth1" tcp dport 443 ct state new accept

        # Allow inbound SMTP (port 25) — new connections to mail server
        iif "eth0" oif "eth1" tcp dport 25  ct state new accept

        # Allow DNS forwarding — internal hosts querying upstream resolvers
        iif "eth1" oif "eth0" udp dport 53 ct state new accept
        iif "eth1" oif "eth0" tcp dport 53 ct state new accept
    }
}

# ─── NAT table ──────────────────────────────────────────────────────────
table ip nat {

    chain prerouting {
        type nat hook prerouting priority -100;
        policy accept;

        # DNAT: redirect inbound HTTP to web server
        iif "eth0" tcp dport 80  dnat to 192.168.1.80

        # DNAT: redirect inbound HTTPS to web server
        iif "eth0" tcp dport 443 dnat to 192.168.1.80

        # DNAT: redirect inbound SMTP to mail server
        iif "eth0" tcp dport 25  dnat to 192.168.1.80
    }

    chain postrouting {
        type nat hook postrouting priority 100;
        policy accept;

        # Masquerade all outbound traffic leaving eth0 (provides internet NAT)
        oif "eth0" masquerade

        # SNAT: web server return traffic — rewrite source to firewall's eth1 IP
        # so replies are routed back through the firewall, not sent directly
        oif "eth1" tcp dport 80  ip daddr 192.168.1.80 snat to 192.168.1.254

        # SNAT: HTTPS return traffic
        oif "eth1" tcp dport 443 ip daddr 192.168.1.80 snat to 192.168.1.254

        # SNAT: SMTP return traffic
        oif "eth1" tcp dport 25  ip daddr 192.168.1.80 snat to 192.168.1.254
    }
}
